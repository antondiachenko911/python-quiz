<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Перевірка базових знань Python</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f8;
    text-align: center;
    padding: 40px;
}

h1 {
    font-size: 36px;
}

#quiz-container, #result-screen {
    max-width: 600px;
    margin: 0 auto;
}

button {
    padding: 10px 20px;
    margin: 10px;
    font-size: 16px;
    cursor: pointer;
}

.option-btn {
    display: block;
    width: 100%;
    margin: 10px 0;
}

#timer {
    font-size: 18px;
    margin-bottom: 20px;
    color: #555;
}

#result-screen {
    display: none;
    background: white;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<h1>Перевірка базових знань Python</h1>

<div id="start-screen">
    <input type="text" id="username" placeholder="Введіть ваше ім'я">
    <br><br>
    <button onclick="startQuiz()">Почати тест</button>
</div>

<div id="quiz-container" style="display:none;">
    <div id="timer"></div>
    <h2 id="question"></h2>
    <div id="options"></div>
</div>

<div id="result-screen">
    <h2 id="result-name"></h2>
    <h3 id="result-score"></h3>
    <h3 id="result-percent"></h3>
    <h3 id="result-status"></h3>
    <br>
    <button onclick="location.reload()">Пройти ще раз</button>
</div>

<script>

const questions = [
{
    question: "Що виведе print(type(5))?",
    options: ["<class 'int'>", "<class 'str'>", "int", "number"],
    correct: 0
},
{
    question: "Який оператор використовується для степеня?",
    options: ["^", "**", "//", "%%"],
    correct: 1
},
{
    question: "Що повертає len([1,2,3])?",
    options: ["2", "3", "4", "Error"],
    correct: 1
},
{
    question: "Який тип даних є незмінним?",
    options: ["list", "dict", "set", "tuple"],
    correct: 3
},
{
    question: "Як створити функцію в Python?",
    options: ["function myFunc()", "def myFunc():", "create myFunc()", "func myFunc()"],
    correct: 1
}
];

let currentQuestion = 0;
let score = 0;
let timer;
let timeLeft = 60;
let name = "";

function startQuiz() {
    name = document.getElementById("username").value.trim();

    if (name === "") {
        alert("Введіть ім'я");
        return;
    }

    document.getElementById("start-screen").style.display = "none";
    document.getElementById("quiz-container").style.display = "block";

    showQuestion();
}

function showQuestion() {
    if (currentQuestion >= questions.length) {
        endQuiz();
        return;
    }

    timeLeft = 60;
    document.getElementById("timer").innerText = "Час: " + timeLeft + " сек";

    timer = setInterval(() => {
        timeLeft--;
        document.getElementById("timer").innerText = "Час: " + timeLeft + " сек";

        if (timeLeft <= 0) {
            clearInterval(timer);
            currentQuestion++;
            showQuestion();
        }
    }, 1000);

    const q = questions[currentQuestion];
    document.getElementById("question").innerText = q.question;

    const optionsDiv = document.getElementById("options");
    optionsDiv.innerHTML = "";

    q.options.forEach((option, index) => {
        const btn = document.createElement("button");
        btn.innerText = option;
        btn.classList.add("option-btn");
        btn.onclick = () => {
            clearInterval(timer);
            if (index === q.correct) {
                score++;
            }
            currentQuestion++;
            showQuestion();
        };
        optionsDiv.appendChild(btn);
    });
}

function endQuiz() {

    const percent = Math.round((score / questions.length) * 100);

    document.getElementById("quiz-container").style.display = "none";
    document.getElementById("result-screen").style.display = "block";

    document.getElementById("result-name").innerText =
        name + ", ваш результат:";

    document.getElementById("result-score").innerText =
        score + " / " + questions.length;

    document.getElementById("result-percent").innerText =
        percent + "%";

    const statusEl = document.getElementById("result-status");

    if (percent >= 80) {
        statusEl.innerText = "✅ Passed";
        statusEl.style.color = "green";
    } else {
        statusEl.innerText = "❌ Needs improvement";
        statusEl.style.color = "red";
    }

    fetch("https://script.google.com/macros/s/AKfycbzNmz9wZUIeE7fXGSwsyf865BnddcnWhGdn-duH9RF57HEAR_Z1l7VUnc8zvM9dj8I4jA/exec", {
        method: "POST",
        body: JSON.stringify({
            name: name,
            score: score,
            total: questions.length,
            percent: percent
        })
    })
    .then(res => res.text())
    .then(data => console.log("Saved:", data))
    .catch(err => console.error("Error:", err));
}

</script>

</body>
</html>
