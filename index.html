<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Python Quiz</title>
<style>
body { font-family: Arial; text-align: center; padding: 40px; background:#f4f6f8;}
button { padding:10px; margin:5px; cursor:pointer;}
.option-btn { display:block; width:100%; max-width:400px; margin:10px auto;}
#result-screen { display:none; }
</style>
</head>

<body>

<h1>Перевірка знань Python</h1>

<div id="start-screen">
<input type="text" id="username" placeholder="Введіть ім'я">
<br><br>
<button onclick="startQuiz()">Почати тест</button>
</div>

<div id="quiz-container" style="display:none;">
<div id="timer"></div>
<h2 id="question"></h2>
<div id="options"></div>
</div>

<div id="result-screen">
<h2 id="result-name"></h2>
<h3 id="result-score"></h3>
<h3 id="result-percent"></h3>
<h3 id="result-status"></h3>
<button onclick="location.reload()">Пройти ще раз</button>
</div>

<script>

const questions = [
{
question: "Що виведе print(type(5))?",
options: ["<class 'int'>", "<class 'str'>", "int", "number"],
correct: 0
},
{
question: "Який оператор степеня?",
options: ["^", "**", "//", "%"],
correct: 1
},
{
question: "len([1,2,3]) поверне?",
options: ["2", "3", "4", "Error"],
correct: 1
}
];

let currentQuestion = 0;
let score = 0;
let timer;
let timeLeft = 60;
let name = "";

function startQuiz() {
name = document.getElementById("username").value.trim();
if (!name) { alert("Введіть ім'я"); return; }

document.getElementById("start-screen").style.display="none";
document.getElementById("quiz-container").style.display="block";
showQuestion();
}

function showQuestion() {

if (currentQuestion >= questions.length) {
endQuiz();
return;
}

timeLeft = 60;
document.getElementById("timer").innerText = "Час: " + timeLeft;

timer = setInterval(function(){
timeLeft--;
document.getElementById("timer").innerText = "Час: " + timeLeft;
if(timeLeft<=0){
clearInterval(timer);
currentQuestion++;
showQuestion();
}
},1000);

const q = questions[currentQuestion];
document.getElementById("question").innerText = q.question;

const optionsDiv = document.getElementById("options");
optionsDiv.innerHTML="";

q.options.forEach(function(option,index){
const btn = document.createElement("button");
btn.innerText = option;
btn.className="option-btn";

btn.onclick = function(){
clearInterval(timer);
if(index===q.correct){ score++; }
currentQuestion++;
showQuestion();
};

optionsDiv.appendChild(btn);
});
}

function endQuiz(){

const percent = Math.round((score/questions.length)*100);

document.getElementById("quiz-container").style.display="none";
document.getElementById("result-screen").style.display="block";

document.getElementById("result-name").innerText = name + ", результат:";
document.getElementById("result-score").innerText = score + "/" + questions.length;
document.getElementById("result-percent").innerText = percent + "%";

if(percent>=80){
document.getElementById("result-status").innerText="Passed";
}else{
document.getElementById("result-status").innerText="Needs improvement";
}

const formData = new FormData();
formData.append("name",name);
formData.append("score",score);
formData.append("total",questions.length);
formData.append("percent",percent);

fetch("https://script.google.com/macros/s/AKfycbzZ3Go1WYgA5jbMT7SqQii_5V8y84IQsbIPbrvX3UzNVqmYgcz-FmKy9ZuO2iFV5FHvsg/exec",{
method:"POST",
body:formData
});

}

</script>

</body>
</html>
