<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Python Code Quiz</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f8;
    text-align: center;
    padding: 40px;
}

h1 {
    margin-bottom: 30px;
}

#quiz-container, #result-screen {
    max-width: 700px;
    margin: 0 auto;
}

button {
    padding: 10px 20px;
    margin: 8px 0;
    font-size: 16px;
    cursor: pointer;
}

.option-btn {
    display: block;
    width: 100%;
}

#timer {
    font-size: 18px;
    margin-bottom: 15px;
    color: #555;
}

#question-image img {
    max-width: 100%;
    border-radius: 8px;
    margin: 20px 0;
}

#result-screen {
    display: none;
    background: white;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<h1>Перевірка знань Python (Code Review)</h1>

<div id="start-screen">
    <input type="text" id="username" placeholder="Введіть ваше ім'я">
    <br><br>
    <button onclick="startQuiz()">Почати тест</button>
</div>

<div id="quiz-container" style="display:none;">
    <div id="timer"></div>
    <h2 id="question"></h2>
    <div id="question-image"></div>
    <div id="options"></div>
</div>

<div id="result-screen">
    <h2 id="result-name"></h2>
    <h3 id="result-score"></h3>
    <h3 id="result-percent"></h3>
    <h3 id="result-status"></h3>
    <br>
    <button onclick="location.reload()">Пройти ще раз</button>
</div>

<script>

const questions = [

{
question: "Що виведе цей код?",
image: "https://raw.githubusercontent.com/antondiachenko911/python-quiz/main/q1.jpeg",
options: ["5", "6", "Error", "None"],
correct: 0
},

{
question: "Який результат виконання коду?",
image: "https://raw.githubusercontent.com/antondiachenko911/python-quiz/main/q2.jpeg",
options: ["True", "False", "None", "Error"],
correct: 1
},

{
question: "Що поверне функція?",
image: "https://raw.githubusercontent.com/antondiachenko911/python-quiz/main/q3.jpeg",
options: ["10", "15", "20", "25"],
correct: 2
}

];

let currentQuestion = 0;
let score = 0;
let timer;
let timeLeft = 30;
let name = "";

function startQuiz() {
    name = document.getElementById("username").value.trim();

    if (!name) {
        alert("Введіть ім'я");
        return;
    }

    document.getElementById("start-screen").style.display = "none";
    document.getElementById("quiz-container").style.display = "block";

    showQuestion();
}

function showQuestion() {

    if (currentQuestion >= questions.length) {
        endQuiz();
        return;
    }

    timeLeft = 30;
    document.getElementById("timer").innerText = "Час: " + timeLeft + " сек";

    timer = setInterval(() => {
        timeLeft--;
        document.getElementById("timer").innerText = "Час: " + timeLeft + " сек";

        if (timeLeft <= 0) {
            clearInterval(timer);
            currentQuestion++;
            showQuestion();
        }
    }, 1000);

    const q = questions[currentQuestion];

    document.getElementById("question").innerText = q.question;

    const imageContainer = document.getElementById("question-image");
    imageContainer.innerHTML = "";

    if (q.image) {
        const img = document.createElement("img");
        img.src = q.image;
        imageContainer.appendChild(img);
    }

    const optionsDiv = document.getElementById("options");
    optionsDiv.innerHTML = "";

    q.options.forEach((option, index) => {
        const btn = document.createElement("button");
        btn.innerText = option;
        btn.className = "option-btn";

        btn.onclick = () => {
            clearInterval(timer);

            if (index === q.correct) {
                score++;
            }

            currentQuestion++;
            showQuestion();
        };

        optionsDiv.appendChild(btn);
    });
}

function endQuiz() {

    const percent = Math.round((score / questions.length) * 100);

    document.getElementById("quiz-container").style.display = "none";
    document.getElementById("result-screen").style.display = "block";

    document.getElementById("result-name").innerText =
        name + ", ваш результат:";

    document.getElementById("result-score").innerText =
        score + " / " + questions.length;

    document.getElementById("result-percent").innerText =
        percent + "%";

    const statusEl = document.getElementById("result-status");

    if (percent >= 80) {
        statusEl.innerText = "✅ Passed";
        statusEl.style.color = "green";
    } else {
        statusEl.innerText = "❌ Needs improvement";
        statusEl.style.color = "red";
    }

    const formData = new FormData();
    formData.append("name", name);
    formData.append("score", score);
    formData.append("total", questions.length);
    formData.append("percent", percent);

    fetch("https://script.google.com/macros/s/AKfycbzZ3Go1WYgA5jbMT7SqQii_5V8y84IQsbIPbrvX3UzNVqmYgcz-FmKy9ZuO2iFV5FHvsg/exec", {
        method: "POST",
        body: formData
    });
}

</script>

</body>
</html>
